# Analysis Regex Patterns for Yahoo Finance
# These patterns extract data from the HTML tables on analysis pages
# Based on actual HTML structure inspection - uses class "yf-kl4vme"

# Earnings Estimate patterns
earnings_estimate:
  section_pattern: 'data-testid="earningsEstimate"'
  currency_pattern: 'Currency in ([A-Z]{3})'
  # Pattern matches: <tr class="yf-kl4vme"><td class="yf-kl4vme">Label</td> <td class="yf-kl4vme">val1</td><td class="yf-kl4vme">val2</td><td class="yf-kl4vme">val3</td><td class="yf-kl4vme">val4</td> </tr>
  table_row_pattern: '<tr class="yf-kl4vme"><td class="yf-kl4vme">([^<]+)</td> <td class="yf-kl4vme">([^<]*)</td><td class="yf-kl4vme">([^<]*)</td><td class="yf-kl4vme">([^<]*)</td><td class="yf-kl4vme">([^<]*)</td> </tr>'

# Revenue Estimate patterns
revenue_estimate:
  section_pattern: 'data-testid="revenueEstimate"'
  currency_pattern: 'Currency in ([A-Z]{3})'
  table_row_pattern: '<tr class="yf-kl4vme"><td class="yf-kl4vme">([^<]+)</td> <td class="yf-kl4vme">([^<]*)</td><td class="yf-kl4vme">([^<]*)</td><td class="yf-kl4vme">([^<]*)</td><td class="yf-kl4vme">([^<]*)</td> </tr>'

# Earnings History patterns
earnings_history:
  section_pattern: 'data-testid="earningsHistory"'
  currency_pattern: 'Currency in ([A-Z]{3})'
  header_pattern: '<th class="yf-kl4vme">([^<]+)</th>'
  table_row_pattern: '<tr class="yf-kl4vme"><td class="yf-kl4vme">([^<]+)</td>(.*?)</tr>'
  table_cell_pattern: '<td class="yf-kl4vme">([^<]*)</td>'

# EPS Trend patterns
