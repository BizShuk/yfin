# ampy-config (yfinance-go) - Development Environment
# This is an example configuration file for development

app:
  env: "dev"                         # dev | staging | prod
  run_id: ""                         # optional; CLI can override

yahoo:
  base_url: "https://query2.finance.yahoo.com"   # abstracted behind adapter
  timeout_ms: 6000
  idle_timeout_ms: 30000
  max_conns_per_host: 64
  user_agent: "AmpyFin-yfinance-go/1.x"

concurrency:
  global_workers: 64
  per_host_workers: 32

rate_limit:
  per_host_qps: 5.0
  per_host_burst: 5
  # per_session_qps / per_session_burst removed: session rotation was
  # dropped (see CLAUDE.md); per-session knobs are vestigial.

retry:
  attempts: 5
  base_ms: 250
  max_delay_ms: 8000

circuit_breaker:
  window: 50
  failure_threshold: 0.30
  minimum_requests: 10
  reset_timeout_ms: 30000
  # half_open_probes removed: not consumed by utils/httpx (which uses a
  # single-probe half-open transition). To customise, supply a tuned
  # *httpx.Config via Go code (facade.NewClientWithConfig).

markets:
  # Daily-only enforcement; other intervals are invalid for yfinance-go.
  allowed_intervals: ["1d"]          # enforce daily-only here
  # Optional MIC allowlist; if empty, no filtering.
  allowed_mics: ["XNAS","XNYS","XNMS","NYQ","KSC","XETR","XTKS"]
  default_adjustment_policy: "split_dividend"   # raw | split_dividend

fx:
  provider: "none"                    # none | yahoo-web
  target: ""                          # optional; CLI preview override allowed
  cache_ttl_ms: 60000
  rate_scale: 8
  rounding: "half_up"
  yahoo_web:
    qps: 0.5
    burst: 1
    timeout_ms: 5000
    backoff_attempts: 4
    backoff_base_ms: 250
    backoff_max_delay_ms: 4000
    circuit_reset_ms: 30000

scrape:
  enabled: true
  # scrape HTTP knobs (user_agent / timeout_ms / qps / burst / retry.*)
  # removed: defaults now live in svc/scrape.DefaultConfig().HTTP and can
  # be overridden via Go code (facade.NewScrapeClientFromConfig takes a
  # *config.ScrapeConfig whose HTTP field is settable).
  robots_policy: "enforce"
  cache_ttl_ms: 60000
  endpoints:
    key_statistics: true
    financials: true
    analysis: true
    profile: true
    news: true

observability:
  logs:
    level: "info"                     # info | debug | warn | error
  metrics:
    prometheus:
      enabled: true
      addr: ":9090"                   # exporter bind address (Step 10 wiring)
  tracing:
    otlp:
      enabled: true
      endpoint: "${OTEL_EXPORTER_OTLP_ENDPOINT:-http://localhost:4317}"
      sample_ratio: 0.05

secrets:
  # Reference secrets by URI; resolution handled by ampy-config (e.g., env:, file:, gcp-sm:, aws-sm:)
  # Examples:
  # - name: "api_token"
  #   ref: "env:API_TOKEN"
  #   required: false
